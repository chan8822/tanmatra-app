<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TANMATRA — Culinary Precision. Artisanal Craft.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        gold: '#D4AF37', 'gold-dark': '#735c00', 'gold-light': '#e9c349',
        'surface-950': '#0c0f0f', 'surface-low': '#1a1c1c', 'off-white': '#f9f9f9', 'error': '#ba1a1a',
      },
      fontFamily: { display: ['"Noto Serif"','serif'], body: ['"Work Sans"','sans-serif'] }
    }
  }
}
</script>
<style>
* { -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0c0f0f; --surface: #1a1c1c; --text: #f9f9f9; --muted: rgba(255,255,255,0.4);
  --gold: #D4AF37; --gold-dark: #735c00;
}
[data-theme="light"] {
  --bg: #fafaf9; --surface: #ffffff; --text: #1c1917; --muted: rgba(0,0,0,0.4);
  --gold: #B8860B; --gold-dark: #8B6914;
}
body { font-family: 'Work Sans', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.slide-up { animation: slideUp 0.4s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.pulse-gold { animation: pulseGold 2s infinite; }
@keyframes pulseGold { 0%,100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.3); } 50% { box-shadow: 0 0 0 8px rgba(212,175,55,0); } }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
.desktop-nav { display: none; }
@media (min-width: 1024px) {
  .desktop-nav { display: flex; }
  .mobile-only { display: none !important; }
}
</style>
<script src="api-client.js"></script>
</head>
<body class="min-h-screen" style="background:var(--bg); color:var(--text);">
<div id="app" class="max-w-[450px] lg:max-w-none mx-auto lg:mx-0 min-h-screen relative"></div>

<script>
// ============================================================
// THEME
// ============================================================
function getTheme() { return localStorage.getItem('tanmatra-theme') || 'dark'; }
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('tanmatra-theme', theme);
}
setTheme(getTheme());
function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); render(); }

// ============================================================
// GLOBAL STATE
// ============================================================
let menuItems = [];
let menuCategories = [];
let cart = [];
let currentUser = null;
let isLoading = false;

// ============================================================
// DATA LOADING
// ============================================================
async function initData() {
  try {
    isLoading = true;
    render();
    const [cats, items] = await Promise.all([
      TanmatraAPI.menu.categories(),
      TanmatraAPI.menu.items()
    ]);
    menuCategories = cats;
    menuItems = items.map(it => ({
      ...it,
      kitchen: it.category_name || 'Tanmatra',
      dietaryTags: it.tags || [],
      trackSuitability: inferTracks(it.tags, it.category_id),
      verified: it.rd_verified,
      allergens: [],
      fibre: it.fiber || 0,
      description: it.description || `${it.name} — crafted with precision at Tanmatra's Noida kitchen.`,
    }));
    isLoading = false;
    render();
  } catch (e) {
    console.error('Failed to load menu:', e);
    isLoading = false;
    // Fallback to empty state
    render();
  }
}

function inferTracks(tags, catId) {
  const t = (tags || []).map(s => s.toLowerCase());
  const tracks = [];
  if (t.includes('protein+') || t.includes('fitness') || t.includes('athlete')) tracks.push('Athlete');
  if (t.includes('low cal') || t.includes('keto') || t.includes('senior') || t.includes('heart-healthy')) tracks.push('Senior');
  if (t.includes('hidden-veggie') || t.includes('junior')) tracks.push('Junior');
  tracks.push('Everyday');
  return [...new Set(tracks)];
}

function getUserId() {
  return currentUser ? currentUser.id : 1;
}

async function loadCart() {
  try {
    cart = await TanmatraAPI.cart.get(getUserId());
  } catch (e) {
    cart = [];
  }
}

// ============================================================
// ROUTER
// ============================================================
function navigate(path) { window.location.hash = path; render(); }
function getRoute() { return window.location.hash.slice(1) || '/'; }

function render() {
  const app = document.getElementById('app');
  const route = getRoute();
  window.scrollTo(0, 0);

  if (isLoading) {
    app.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="text-center"><div class="w-10 h-10 border-2 border-gold border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p class="text-sm text-white/40">Loading Tanmatra...</p></div></div>`;
    return;
  }

  if (route === '/' || route === '') renderHome(app);
  else if (route === '/menu') renderMenu(app);
  else if (route.startsWith('/menu/')) renderDish(app, route.split('/')[2]);
  else if (route === '/cart') renderCart(app);
  else if (route === '/checkout') renderCheckout(app);
  else if (route === '/orders') renderOrders(app);
  else if (route.startsWith('/order/')) renderOrderDetail(app, route.split('/')[2]);
  else if (route === '/family') renderFamily(app);
  else if (route === '/wellness') renderWellness(app);
  else if (route === '/trust') renderTrust(app);
  else if (route === '/track') renderTrack(app);
  else renderHome(app);
}

// ============================================================
// HOME
// ============================================================
function renderHome(app) {
  app.innerHTML = `
    <div class="fade-in">
      <section class="relative h-[85vh] lg:h-[92vh] flex flex-col justify-end p-6 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-surface-950/60 to-surface-950 z-10"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-yellow-900/20 via-surface-950 to-surface-950"></div>
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 30% 40%, #D4AF37 0%, transparent 50%), radial-gradient(circle at 70% 60%, #735c00 0%, transparent 40%);"></div>
        <div class="relative z-20 space-y-6">
          <div>
            <h2 class="text-xs tracking-[0.25em] uppercase text-gold mb-3">Noida's Premium Kitchen</h2>
            <h1 class="font-display text-4xl leading-tight text-off-white">Culinary Precision.<br><span class="text-gold">Artisanal Craft.</span></h1>
          </div>
          <p class="text-sm text-white/60 leading-relaxed max-w-[340px]">RD-verified meals, engineered for your family's health tracks — Athlete, Junior, Senior, Everyday. 83 dishes across 14 categories.</p>
          <div class="space-y-3">
            <button onclick="navigate('/menu')" class="w-full py-3.5 rounded-lg font-semibold text-sm tracking-wide bg-gold text-surface-950 active:scale-[0.98] transition-transform">Explore the Menu</button>
            <button onclick="navigate('/wellness')" class="w-full py-3.5 rounded-lg font-semibold text-sm tracking-wide border border-gold/40 text-gold hover:bg-gold/10 active:scale-[0.98] transition-transform">Wellness Signature →</button>
          </div>
        </div>
      </section>

      <section class="px-6 py-10 space-y-6">
        <h2 class="font-display text-2xl text-gold">Why Tanmatra</h2>
        <div class="space-y-4">
          ${[{icon:'🌿',title:'RD-Verified Nutrition',desc:'Every dish reviewed by registered dietitians for macro accuracy and health alignment.'},{icon:'❤️',title:'Per-Family Health Tracks',desc:'Athlete, Junior, Senior, Everyday — each member gets meals matched to their profile.'},{icon:'🛡️',title:'Clinical Delivery',desc:'Tamper-proof packaging with RD nutritional cards. Proprietary riders for priority orders.'}].map(f=>`
            <div class="bg-surface-low border border-white/5 rounded-xl p-4 flex gap-4">
              <div class="w-10 h-10 rounded-lg bg-gold/10 flex items-center justify-center shrink-0 text-lg">${f.icon}</div>
              <div><h3 class="text-sm font-semibold text-off-white mb-1">${f.title}</h3><p class="text-xs text-white/50 leading-relaxed">${f.desc}</p></div>
            </div>
          `).join('')}
        </div>
      </section>

      <section class="px-6 py-10">
        <h2 class="font-display text-2xl text-gold mb-6">Collections</h2>
        <div class="space-y-4">
          ${menuCategories.length ? menuCategories.slice(0,6).map(c => `
            <button onclick="navigate('/menu')" class="w-full relative h-32 rounded-xl overflow-hidden text-left active:scale-[0.98] transition-transform">
              <div class="absolute inset-0 bg-gradient-to-r from-yellow-900/40 to-surface-950"></div>
              <div class="absolute inset-0 flex items-end p-4"><div><h3 class="font-display text-xl text-off-white">${c.name}</h3><p class="text-xs text-white/60">${c.description || 'Premium selection'}</p></div><span class="text-gold ml-auto mb-1 text-xl">›</span></div>
            </button>
          `).join('') : `
            <button onclick="navigate('/menu')" class="w-full relative h-40 rounded-xl overflow-hidden text-left active:scale-[0.98] transition-transform">
              <div class="absolute inset-0 bg-gradient-to-r from-yellow-900/40 to-surface-950"></div>
              <div class="absolute inset-0 flex items-end p-4"><div><h3 class="font-display text-xl text-off-white">Full Menu</h3><p class="text-xs text-white/60">83 dishes across 14 categories</p></div><span class="text-gold ml-auto mb-1 text-xl">›</span></div>
            </button>
          `}
        </div>
      </section>

      <section class="px-6 py-10 space-y-3">
        <h2 class="font-display text-2xl text-gold mb-4">Your Track</h2>
        ${[{label:'Athlete',href:'/track',color:'bg-gold/10 border-gold/30 text-gold'},{label:'Junior',href:'/track',color:'bg-green-900/20 border-green-700/30 text-green-400'},{label:'Senior',href:'/track',color:'bg-blue-900/20 border-blue-700/30 text-blue-400'},{label:'Everyday',href:'/menu',color:'bg-white/5 border-white/10 text-white/70'}].map(t=>`
          <button onclick="navigate('${t.href}')" class="w-full border rounded-lg p-4 flex items-center justify-between ${t.color} active:scale-[0.98] transition-transform">
            <span class="text-sm font-medium">${t.label} Track</span><span>›</span>
          </button>
        `).join('')}
      </section>

      <section class="px-6 py-10">
        <div class="bg-surface-low border border-white/5 rounded-xl p-4 flex items-center justify-around">
          ${[{icon:'🛡️',label:'RD Verified'},{icon:'⚡',label:'15-min Elite'},{icon:'📍',label:'Noida Only'},{icon:'⭐',label:'4.9 Rating'}].map(t=>`<div class="text-center"><div class="text-lg mb-1">${t.icon}</div><div class="text-[10px] text-white/40">${t.label}</div></div>`).join('')}
        </div>
      </section>

      <section class="px-6 py-10" id="ai-recs-section">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display text-xl text-gold">🤖 AI For You</h2>
          <button onclick="loadAIRecommendations()" class="text-[10px] text-white/40 hover:text-gold">Refresh</button>
        </div>
        <div id="ai-recs-content" class="space-y-3">
          <div class="text-center py-8">
            <div class="w-8 h-8 border-2 border-gold border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="text-xs text-white/40">AI is analyzing your preferences...</p>
          </div>
        </div>
      </section>

      <footer class="px-6 py-10 text-center border-t border-white/5">
        <h3 class="font-display text-gold text-sm tracking-[0.2em] uppercase mb-2">TANMATRA</h3>
        <p class="text-xs text-white/30">Crafted for the discerning palate.</p>
        <div class="flex justify-center gap-4 mt-4">
          <button onclick="navigate('/trust')" class="text-xs text-white/40 hover:text-gold">Trust & Authority</button>
          <button onclick="navigate('/menu')" class="text-xs text-white/40 hover:text-gold">Menu</button>
          <button onclick="navigate('/wellness')" class="text-xs text-white/40 hover:text-gold">Subscriptions</button>
        </div>
      </footer>
    </div>`;
}

// ============================================================
// MENU
// ============================================================
function renderMenu(app) {
  let activeCategory = 'All', search = '';

  function getFiltered() {
    let items = [...menuItems];
    if (activeCategory !== 'All') {
      items = items.filter(i => i.category_name === activeCategory || i.category_id === activeCategory);
    }
    if (search) items = items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));
    return items;
  }

  function refresh() {
    const items = getFiltered();
    const grid = document.getElementById('menu-grid');
    if (!grid) return;
    grid.innerHTML = items.length ? items.map(item => `
      <button onclick="navigate('/menu/${item.id}')" class="w-full bg-surface-low border border-white/5 rounded-xl p-3 flex gap-3 active:bg-white/5 transition-colors text-left">
        <div class="w-20 h-20 rounded-lg bg-gradient-to-br from-yellow-900/30 to-surface-950 flex items-center justify-center shrink-0 text-2xl">${getItemEmoji(item)}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <h3 class="text-sm font-semibold text-off-white truncate">${item.name}</h3>
            <span class="text-sm text-gold font-medium shrink-0">₹${item.price.toLocaleString('en-IN')}</span>
          </div>
          <p class="text-xs text-white/40 mt-0.5 line-clamp-1">${item.description.substring(0, 60)}${item.description.length > 60 ? '...' : ''}</p>
          <div class="flex items-center gap-2 mt-2 flex-wrap">
            ${item.verified ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-gold/10 text-gold">⭐ RD</span>' : ''}
            ${item.is_vegetarian ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-green-900/30 text-green-400">Veg</span>' : '<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-900/30 text-red-400">Non-Veg</span>'}
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-white/5 text-white/40 capitalize">${item.category_name || 'Menu'}</span>
            ${item.calories ? `<span class="text-[10px] text-white/30">${item.calories} kcal</span>` : ''}
          </div>
        </div>
      </button>
    `).join('') : '<div class="text-center py-12 text-sm text-white/30">No dishes match your filters</div>';
  }

  const catButtons = [{id:'All',name:'All'}, ...menuCategories.map(c => ({id:c.name,name:c.name}))];

  app.innerHTML = `
    <div class="fade-in min-h-screen">
      <div class="sticky top-0 z-30 bg-surface-950/90 backdrop-blur-md border-b border-white/5 px-4 py-3">
        <div class="flex items-center gap-3">
          <button onclick="navigate('/')" class="text-gold text-xl">‹</button>
          <h1 class="font-display text-lg text-gold">Menu</h1>
          <span class="text-[10px] text-white/30 ml-auto">${menuItems.length} dishes</span>
        </div>
        <div class="mt-3 flex items-center gap-2 bg-surface-low rounded-lg px-3 py-2 border border-white/5">
          <span class="text-white/30 text-sm">🔍</span>
          <input id="menu-search" class="bg-transparent text-sm outline-none flex-1 placeholder:text-white/30 text-off-white" placeholder="Search dishes…">
        </div>
        <div id="filter-bar" class="flex gap-2 mt-3 overflow-auto pb-1 scrollbar-hide">
          ${catButtons.map(f => `<button class="filter-btn shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${f.id==='All'?'bg-gold text-surface-950':'bg-white/5 text-white/50 hover:bg-white/10'}" data-filter="${f.id}">${f.name}</button>`).join('')}
        </div>
      </div>
      <div id="menu-grid" class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-3 pb-20"></div>
    </div>`;

  setTimeout(() => {
    refresh();
    const searchEl = document.getElementById('menu-search');
    if (searchEl) {
      searchEl.addEventListener('input', (e) => { search = e.target.value; refresh(); });
    }
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors bg-white/5 text-white/50 hover:bg-white/10');
        btn.className = 'filter-btn shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors bg-gold text-surface-950';
        refresh();
      });
    });
  }, 0);
}

function getItemEmoji(item) {
  const emojis = {
    soups: '🍲', wraps: '🌯', omelettes: '🍳', salads: '🥗',
    sandwiches: '🥪', pasta: '🍝', 'burrito-bowls': '🍚',
    'healthy-meals': '🍱', breakfast: '🌅', 'meal-boxes': '📦',
    drinks: '🥤', detox: '🧃', smoothies: '🥤', desserts: '🍰'
  };
  return emojis[item.category_id] || (item.is_vegetarian ? '🥬' : '🍖');
}

// ============================================================
// DISH DETAIL
// ============================================================
function renderDish(app, id) {
  const item = menuItems.find(i => i.id === id);
  if (!item) {
    app.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="text-center"><p class="text-white/40 text-sm mb-4">Dish not found</p><button onclick="navigate('/menu')" class="text-gold text-sm">← Back to Menu</button></div></div>`;
    return;
  }

  app.innerHTML = `
    <div class="fade-in min-h-screen">
      <div class="relative h-64 bg-gradient-to-br from-yellow-900/30 via-surface-low to-surface-950">
        <button onclick="navigate('/menu')" class="absolute top-4 left-4 z-10 w-8 h-8 rounded-full bg-surface-950/60 flex items-center justify-center text-gold text-lg">‹</button>
        <div class="absolute inset-0 flex items-center justify-center text-6xl">${getItemEmoji(item)}</div>
      </div>
      <div class="px-5 -mt-6 relative z-10 pb-8">
        <div class="bg-surface-low border border-white/5 rounded-2xl p-5">
          <div class="flex items-start justify-between gap-3">
            <div><h1 class="font-display text-2xl text-off-white">${item.name}</h1><p class="text-xs text-white/40 mt-1 capitalize">${item.category_name || 'Tanmatra'} Kitchen</p></div>
            <div class="text-xl font-bold text-gold shrink-0">₹${item.price.toLocaleString('en-IN')}</div>
          </div>
          <p class="text-sm text-white/60 mt-3 leading-relaxed">${item.description}</p>
          <div class="flex flex-wrap gap-2 mt-4">
            ${item.verified ? '<span class="text-xs px-2.5 py-1 rounded-full bg-gold/10 text-gold">⭐ RD Verified</span>' : ''}
            ${item.is_vegetarian ? '<span class="text-xs px-2.5 py-1 rounded-full bg-green-900/30 text-green-400">🌿 Vegetarian</span>' : '<span class="text-xs px-2.5 py-1 rounded-full bg-red-900/30 text-red-400">🍖 Non-Veg</span>'}
            ${(item.dietaryTags || []).map(t => `<span class="text-xs px-2.5 py-1 rounded-full bg-white/5 text-white/50">${t}</span>`).join('')}
          </div>
          ${item.trackSuitability && item.trackSuitability.length ? `<div class="mt-4"><h3 class="text-xs text-white/40 uppercase tracking-wider mb-2">Suitable For</h3><div class="flex gap-2">${item.trackSuitability.map(t => `<span class="text-xs px-2 py-1 rounded bg-gold/10 text-gold">${t}</span>`).join('')}</div></div>` : ''}
        </div>
        ${item.calories ? `
        <div class="bg-surface-low border border-white/5 rounded-2xl p-5 mt-4">
          <h3 class="text-xs text-white/40 uppercase tracking-wider mb-3">Nutrition (per serving)</h3>
          <div class="grid grid-cols-3 gap-3">
            ${[{l:'Calories',v:(item.calories||0)+' kcal'},{l:'Protein',v:(item.protein||0)+'g'},{l:'Carbs',v:(item.carbs||0)+'g'},{l:'Fat',v:(item.fat||0)+'g'},{l:'Fibre',v:(item.fibre||0)+'g'},{l:'Sodium',v:(item.sodium||0)+'mg'}].map(n => `<div class="text-center py-2"><div class="text-sm font-semibold text-off-white">${n.v}</div><div class="text-[10px] text-white/30">${n.l}</div></div>`).join('')}
          </div>
        </div>` : ''}
        <button onclick="addToCart('${item.id}')" class="w-full mt-6 py-4 bg-gold text-surface-950 rounded-xl font-semibold text-sm tracking-wide active:scale-[0.98] transition-transform">Add to Cart — ₹${item.price.toLocaleString('en-IN')}</button>
        <button onclick="navigate('/menu')" class="w-full mt-3 py-3 border border-white/10 rounded-xl text-sm text-white/40 active:scale-[0.98] transition-transform">Continue Browsing</button>
      </div>
    </div>`;
}

async function addToCart(itemId) {
  try {
    await TanmatraAPI.cart.add(getUserId(), itemId, 1, '');
    await loadCart();
    showToast('Added to cart');
  } catch (e) {
    showToast('Failed to add to cart');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gold text-surface-950 px-4 py-2 rounded-full text-xs font-medium z-50 fade-in';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ============================================================
// CART
// ============================================================
async function renderCart(app) {
  await loadCart();
  const total = cart.reduce((s, c) => s + (c.menu_item.price * c.quantity), 0);
  app.innerHTML = `
    <div class="fade-in min-h-screen">
      <div class="sticky top-0 z-30 bg-surface-950/90 backdrop-blur-md border-b border-white/5 px-4 py-3">
        <div class="flex items-center gap-3">
          <button onclick="navigate('/')" class="text-gold text-xl">‹</button>
          <h1 class="font-display text-lg text-gold">Cart</h1>
          <span class="text-[10px] text-white/30 ml-auto">${cart.length} items</span>
        </div>
      </div>
      <div class="p-4 space-y-3 pb-8">
        ${cart.length ? cart.map(c => `
          <div class="bg-surface-low border border-white/5 rounded-xl p-4 flex gap-3">
            <div class="w-16 h-16 rounded-lg bg-gradient-to-br from-yellow-900/30 to-surface-950 flex items-center justify-center shrink-0 text-xl">${getItemEmoji(c.menu_item)}</div>

async function initiateRazorpayPayment() {
  try {
    await loadCart();
    if (!cart.length) { showToast('Cart is empty'); return; }
    const subtotal = cart.reduce((s, c) => s + (c.menu_item.price * c.quantity), 0);
    const total = subtotal + 40;
    
    const receipt = 'TAN-' + Date.now();
    const orderRes = await TanmatraAPI.payments.createOrder(total, receipt, getUserId());
    
    if (orderRes.demo_mode) {
      // Demo mode - simulate payment
      showToast('Demo payment processing...');
      setTimeout(() => completeOrder(orderRes.order_id, 'demo_payment_id', true), 1500);
      return;
    }
    
    // Real Razorpay checkout would use their JS SDK here
    // For demo, we simulate success
    showToast('Redirecting to Razorpay...');
    setTimeout(() => completeOrder(orderRes.order_id, 'pay_' + Date.now(), true), 2000);
  } catch (e) {
    showToast('Payment initiation failed');
    console.error(e);
  }
}

async function completeOrder(razorpayOrderId, paymentId, success) {
  if (!success) { showToast('Payment failed'); return; }
  
  try {
    await loadCart();
    const subtotal = cart.reduce((s, c) => s + (c.menu_item.price * c.quantity), 0);
    const total = subtotal + 40;
    const items = cart.map(c => ({ menu_item_id: c.menu_item.id, qty: c.quantity, price: c.menu_item.price, special_instructions: c.special_instructions || '' }));
    
    const res = await TanmatraAPI.orders.create({
      user_id: getUserId(),
      items: items,
      total: total,
      priority: 'Direct',
      delivery_zone: 'Sector 50-62',
      payment_method: 'Razorpay UPI',
      payment_status: 'paid',
      razorpay_order_id: razorpayOrderId,
      razorpay_payment_id: paymentId
    });
    
    // Assign rider via Enatega
    try {
      await TanmatraAPI.delivery.assignRider(res.id, 'Sector 50-62', 'Direct');
    } catch (e) { console.log('Rider assignment simulated'); }
    
    // Clear cart
    for (const c of cart) { await TanmatraAPI.cart.remove(c.id); }
    cart = [];
    showToast('Payment successful! Order: ' + res.id);
    setTimeout(() => navigate('/orders'), 1200);
  } catch (e) {
    showToast('Failed to complete order');
    console.error(e);
  }
}

        ${[{title:'Athlete Track',color:'gold',icon:'⚡',desc:'High-protein, recovery-focused meals for active individuals.',items:menuItems.filter(i => (i.tags||[]).some(t => ['Protein+','Fitness','Athlete'].includes(t))).slice(0,3)},{title:'Senior Track',color:'blue',icon:'🛡️',desc:'Low-sodium, easy-digestion meals for cardiac and cognitive wellness.',items:menuItems.filter(i => (i.tags||[]).some(t => ['Low Cal','Keto','Heart-Healthy'].includes(t))).slice(0,3)},{title:'Junior Track',color:'green',icon:'🌿',desc:'Hidden-veggie, nutrient-dense meals designed for growing bodies.',items:menuItems.filter(i => i.is_vegetarian && (i.tags||[]).some(t => ['Fiber+','Vitamins','Calcium+'].includes(t))).slice(0,3)}].map(track => `
          <div class="bg-surface-low border border-white/5 rounded-xl p-4">
            <div class="flex items-center gap-2 mb-2"><span class="text-xl">${track.icon}</span><h3 class="text-sm font-semibold text-off-white">${track.title}</h3></div>
            <p class="text-xs text-white/40 mb-3">${track.desc}</p>
            <div class="space-y-2">
              ${track.items.map(it => `
                <button onclick="navigate('/menu/${it.id}')" class="w-full flex items-center justify-between p-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors text-left">
                  <span class="text-xs text-off-white">${it.name}</span>
                  <span class="text-xs text-gold">₹${it.price.toLocaleString('en-IN')}</span>
                </button>
              `).join('') || '<div class="text-xs text-white/30">Browse menu for more options</div>'}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// ============================================================
// AI RECOMMENDATIONS
// ============================================================
let aiRecommendations = [];

async function loadAIRecommendations() {
  const container = document.getElementById('ai-recs-content');
  if (!container) return;
  
  try {
    const res = await TanmatraAPI.ai.recommend(getUserId());
    let recs = [];
    try {
      const parsed = JSON.parse(res.text || '{}');
      recs = parsed.recommendations || [];
      aiRecommendations = recs;
    } catch (e) {
      aiRecommendations = [];
    }
    
    if (recs.length) {
      container.innerHTML = recs.map(r => `
        <button onclick="navigate('/menu')" class="w-full bg-surface-low border border-white/5 rounded-xl p-3 flex gap-3 active:bg-white/5 transition-colors text-left">
          <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-yellow-900/30 to-surface-950 flex items-center justify-center shrink-0 text-xl">🍽️</div>
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-semibold text-off-white">${r.dish}</h3>
            <p class="text-xs text-white/40 mt-0.5 line-clamp-2">${r.reason}</p>
            <div class="flex items-center gap-2 mt-1">
              <span class="text-[10px] px-1.5 py-0.5 rounded bg-gold/10 text-gold">${r.category}</span>
              <span class="text-xs text-gold font-medium">₹${r.price}</span>
            </div>
          </div>
        </button>
      `).join('');
    } else {
      container.innerHTML = `<div class="text-center py-6 text-xs text-white/30">Ask the AI assistant for personalized recommendations!</div>`;
    }
  } catch (e) {
    container.innerHTML = `<div class="text-center py-6 text-xs text-white/30">AI recommendations unavailable</div>`;
  }
}

// ============================================================
// AI CHAT WIDGET
// ============================================================
let chatOpen = false;
let chatMessages = [
  {role:'ai',text:'Hello! I am Tanmatra\'s AI nutrition assistant. Ask me for dish recommendations, nutrition analysis, or recipe insights.'}
];

function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('ai-chat-panel');
  if (panel) panel.style.display = chatOpen ? 'flex' : 'none';
}

async function sendChatMessage() {
  const input = document.getElementById('ai-chat-input');
  const text = input.value.trim();
  if (!text) return;
  
  chatMessages.push({role:'user',text});
  input.value = '';
  renderChatMessages();
  
  try {
    const res = await TanmatraAPI.ai.chat(text, getUserId());
    let aiText = res.text || 'Let me think about that...';
    try {
      const parsed = JSON.parse(aiText);
      aiText = parsed.response || parsed.nutrition_tip || parsed.feedback || aiText;
    } catch (e) {}
    chatMessages.push({role:'ai',text:aiText});
    renderChatMessages();
  } catch (e) {
    chatMessages.push({role:'ai',text:'I apologize, I am having trouble connecting. Please try again.'});
    renderChatMessages();
  }
}

function renderChatMessages() {
  const container = document.getElementById('ai-chat-messages');
  if (!container) return;
  container.innerHTML = chatMessages.map(m => `
    <div class="${m.role === 'user' ? 'ml-auto bg-gold text-surface-950' : 'mr-auto bg-surface-low text-off-white'} rounded-xl px-3 py-2 text-xs max-w-[85%]">
      ${m.text}
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function initChatWidget() {
  const widget = document.createElement('div');
  widget.id = 'ai-chat-widget';
  widget.innerHTML = `
    <div id="ai-chat-panel" class="fixed bottom-20 right-4 w-80 h-96 bg-surface-950 border border-gold/20 rounded-2xl flex flex-col z-50 overflow-hidden" style="display:none;box-shadow:0 20px 50px rgba(0,0,0,0.5);">
      <div class="bg-gold/10 px-4 py-3 border-b border-gold/10 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-lg">🤖</span>
          <span class="text-sm font-semibold text-off-white">Tanmatra AI</span>
        </div>
        <button onclick="toggleChat()" class="text-white/40 hover:text-off-white">✕</button>
      </div>
      <div id="ai-chat-messages" class="flex-1 overflow-auto p-3 space-y-2"></div>
      <div class="p-3 border-t border-white/5 flex gap-2">
        <input id="ai-chat-input" type="text" placeholder="Ask about nutrition..." class="flex-1 bg-surface-low border border-white/10 rounded-lg px-3 py-2 text-xs text-off-white outline-none" onkeydown="if(event.key==='Enter')sendChatMessage()">
        <button onclick="sendChatMessage()" class="px-3 py-2 bg-gold text-surface-950 rounded-lg text-xs font-semibold">Send</button>
      </div>
    </div>
    <button onclick="toggleChat()" class="fixed bottom-6 right-4 w-12 h-12 bg-gold rounded-full flex items-center justify-center text-xl z-50 shadow-lg active:scale-95 transition-transform">
      🤖
    </button>
  `;
  document.body.appendChild(widget);
  renderChatMessages();
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('hashchange', render);
initData();
initChatWidget();
setTimeout(() => loadAIRecommendations(), 1500);
</script>
</body>
</html>
