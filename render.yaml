services:
  - type: web
    name: tanmatra-backend
    runtime: docker
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tanmatra-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      - key: ENATEGA_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
    buildCommand: ""
    startCommand: ""
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health

  - type: static
    name: tanmatra-frontend
    plan: starter
    buildCommand: "npm ci && npm run build"
    publishDir: dist
    envVars:
      - key: VITE_API_BASE
        value: https://tanmatra-backend.onrender.com

databases:
  - name: tanmatra-db
    plan: starter
    ipAllowList: []
